<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>รับเข้าสินค้า — Stock System</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--red:#c0172b;--red-light:#e8203a;--red-dark:#7a0e1c;--green:#1aa866;
    --glass:rgba(255,255,255,0.12);--bd:rgba(255,255,255,0.2);--in:rgba(255,255,255,0.08);
    --tw:#fff;--ts:rgba(255,255,255,0.7);--tm:rgba(255,255,255,0.45);--r:16px;--r-sm:12px}
  html,body{height:100%}
  body{background:#54000f;color:var(--tw);font-family:'Kanit',sans-serif;-webkit-font-smoothing:antialiased;
    min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;width:480px;height:480px;border-radius:50%;
    background:radial-gradient(circle,rgba(192,23,43,0.5),transparent 70%);top:-160px;left:-120px;filter:blur(80px);z-index:0}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:16px 14px 90px}

  .top{display:flex;align-items:center;gap:11px;padding:6px 2px 16px}
  .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#e8203a,#7a0e1c);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(192,23,43,0.5);flex-shrink:0}
  .ttl{font-size:18px;font-weight:700;line-height:1}
  .sub{font-size:11px;color:var(--ts);margin-top:3px}
  .sync{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ts);
    background:var(--glass);border:1px solid var(--bd);border-radius:50px;padding:6px 11px;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:#88e6a0}
  .dot.busy{background:#ffce6b;animation:pulse 1s infinite}.dot.err{background:#ff6b6b}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:14px;
    box-shadow:0 10px 32px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.12)}
  .card-t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px;color:rgba(255,210,210,0.95)}
  .ico{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .ico-lg{width:22px;height:22px}

  label{display:block;font-size:12px;color:var(--ts);margin-bottom:6px;font-weight:500}
  input,textarea{width:100%;background:var(--in);border:1px solid var(--bd);border-radius:10px;color:#fff;
    padding:11px 13px;font-size:15px;outline:none;font-family:'Kanit',sans-serif}
  input::placeholder{color:rgba(255,255,255,0.38)}
  input:focus,textarea:focus{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.13)}
  .field{margin-bottom:13px}

  .scan-row{display:flex;gap:8px}
  .scan-row input{flex:1}
  .btn{background:var(--red);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:10px;
    padding:11px 15px;font-family:'Kanit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px rgba(192,23,43,0.4);transition:.15s}
  .btn:hover{background:var(--red-light)}
  .btn.ghost{background:rgba(255,255,255,0.08);box-shadow:none;color:var(--ts);border-color:var(--bd)}
  .btn.ghost:hover{background:rgba(255,255,255,0.16);color:#fff}
  .btn.block{width:100%}
  .btn.big{padding:15px;font-size:15px;border-radius:12px}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn-grid{display:flex;gap:8px;margin-top:8px}
  .btn-grid .btn{flex:1}

  #reader{width:100%;border-radius:var(--r-sm);overflow:hidden;background:#000;margin-top:10px;display:none}
  #reader.on{display:block}
  .hint{font-size:12px;color:var(--ts);margin-top:8px;text-align:center}

  /* product card */
  .pc{display:none}.pc.on{display:block;animation:fade .3s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .pc-img{width:100%;aspect-ratio:4/3;border-radius:var(--r-sm);background:#fff;overflow:hidden;position:relative;
    display:flex;align-items:center;justify-content:center;color:#bbb;margin-bottom:12px;border:1px solid var(--bd)}
  .pc-img img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
  .pc-name{font-size:16px;font-weight:600;line-height:1.35}
  .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;
    border:1px solid var(--bd);background:rgba(255,255,255,0.1);margin-top:8px}
  .pc-model{font-size:12.5px;color:rgba(255,255,255,0.85);margin-top:10px;line-height:1.5}
  .pc-model b{color:rgba(255,200,200,0.95);display:block;margin-bottom:2px}
  .pc-stock{display:flex;gap:10px;margin-top:12px}
  .pc-stock>div{flex:1;background:var(--in);border:1px solid var(--bd);border-radius:10px;padding:8px 11px;text-align:center}
  .pc-stock .n{font-size:18px;font-weight:700}.pc-stock .l{font-size:10.5px;color:var(--tm)}
  .notfound{display:none;margin-top:10px;padding:11px 13px;border-radius:10px;font-size:12.5px;
    background:rgba(190,130,20,0.18);border:1px solid rgba(255,200,80,0.4);color:rgba(255,235,200,0.95)}
  .notfound.on{display:block}

  /* day toggle */
  .seg{display:flex;background:var(--in);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:3px}
  .seg button{flex:1;background:none;border:none;color:var(--ts);font-family:'Kanit',sans-serif;font-size:14px;
    padding:9px;border-radius:8px;cursor:pointer;font-weight:500}
  .seg button.on{background:var(--red);color:#fff}
  .seg.green button.on{background:var(--green)}

  .stepper{display:flex}
  .stepper button{width:48px;height:48px;border:1px solid var(--bd);background:var(--in);color:#fff;cursor:pointer;
    font-size:22px;display:flex;align-items:center;justify-content:center}
  .stepper button:first-child{border-radius:10px 0 0 10px}
  .stepper button:last-child{border-radius:0 10px 10px 0}
  .stepper input{text-align:center;border-radius:0;border-left:none;border-right:none;font-size:18px;font-weight:700}

  .photo{width:100%;aspect-ratio:16/9;border-radius:var(--r-sm);border:1.5px dashed var(--bd);background:var(--in);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;
    overflow:hidden;position:relative;color:var(--ts);font-size:12.5px}
  .photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .photo .retake{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);border:1px solid var(--bd);
    color:#fff;font-size:11px;padding:5px 10px;border-radius:50px;display:flex;align-items:center;gap:5px}

  /* recent */
  .rec{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.07)}
  .rec:last-child{border-bottom:none}
  .rec-th{width:40px;height:40px;border-radius:9px;background:#fff;overflow:hidden;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#bbb;border:1px solid var(--bd)}
  .rec-th img{width:100%;height:100%;object-fit:contain}
  .rec-mid{flex:1;min-width:0}
  .rec-nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec-meta{font-size:11px;color:var(--tm)}
  .rec-q{font-size:15px;font-weight:700;color:#88e6a0}
  .empty{text-align:center;color:var(--tm);font-size:13px;padding:18px}

  .cfg{display:none;background:rgba(190,130,20,0.2);border:1px solid rgba(255,200,80,0.45);border-radius:12px;
    padding:12px 14px;margin-bottom:14px;font-size:13px;color:rgba(255,235,200,0.95);line-height:1.5}
  .cfg.on{display:block}.cfg code{background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:5px;font-size:12px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(60,0,10,0.92);
    backdrop-filter:blur(16px);border:1px solid var(--bd);border-left:3px solid #88e6a0;border-radius:12px;
    padding:12px 18px;font-size:13.5px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,0.4);opacity:0;pointer-events:none;
    transition:.3s;max-width:92%}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"><svg class="ico ico-lg" viewBox="0 0 24 24"><path d="M3 9 4.5 4h15L21 9M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9M3 9h18M9 20v-6h6v6"/></svg></div>
    <div><div class="ttl">รับเข้าสินค้า</div><div class="sub">บันทึกสินค้าเข้าคลัง · สแกนบาร์โค้ด</div></div>
    <span class="sync"><span class="dot" id="syncDot"></span><span id="syncTxt">พร้อม</span></span>
  </div>

  <div class="cfg" id="cfg">
    ยังไม่ได้ตั้งค่าลิงก์ระบบ — เปิดไฟล์นี้แล้วใส่ลิงก์ Web App (/exec) ลงในตัวแปร <code>API_URL</code>
  </div>

  <!-- สแกน -->
  <div class="card">
    <div class="card-t"><svg class="ico" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 8v8M10.5 8v8M14 8v8M17 8v8"/></svg> สแกน / ค้นหารหัส</div>
    <div class="scan-row">
      <input type="text" id="code" placeholder="สแกนหรือพิมพ์รหัสสินค้า" inputmode="text"
        onkeyup="if(event.key==='Enter')doLookup()">
      <button class="btn" onclick="doLookup()"><svg class="ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
    </div>
    <div class="btn-grid">
      <button class="btn" id="camBtn" onclick="toggleCam()"><svg class="ico" viewBox="0 0 24 24"><path d="M3 9a2 2 0 0 1 2-2h2l1.5-2.2h7L17 7h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.3"/></svg> เปิดกล้อง</button>
      <label class="btn ghost" style="cursor:pointer"><svg class="ico" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg> จากรูป
        <input type="file" id="scanFile" accept="image/*" style="display:none" onchange="scanFromFile(event)"></label>
    </div>
    <div id="reader"></div>
    <div class="hint" id="scanHint"></div>
  </div>

  <!-- ข้อมูลสินค้า + ฟอร์มรับเข้า -->
  <div class="card pc" id="pc">
    <div class="pc-img" id="pcImg"></div>
    <div class="pc-name" id="pcName"></div>
    <div id="pcBadges"></div>
    <div class="pc-model" id="pcModel"></div>
    <div class="pc-stock" id="pcStock"></div>
  </div>
  <div class="notfound" id="nf"></div>

  <div class="card" id="formCard" style="display:none">
    <div class="card-t"><svg class="ico" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> รับเข้าสตอค</div>
    <div class="field">
      <label>รับเข้าวันไหน</label>
      <div class="seg green" id="daySeg">
        <button class="on" data-day="wed" onclick="setDay('wed')">สตอค Wed</button>
        <button data-day="sun" onclick="setDay('sun')">สตอค Sun</button>
      </div>
    </div>
    <div class="field">
      <label>จำนวนที่รับเข้า</label>
      <div class="stepper">
        <button onclick="bump(-1)">−</button>
        <input type="number" id="qty" value="1" min="1" inputmode="numeric">
        <button onclick="bump(1)">+</button>
      </div>
    </div>
    <div class="field" id="nameField" style="display:none">
      <label>ชื่อสินค้า (กรณีไม่พบรหัส)</label>
      <input type="text" id="pname" placeholder="พิมพ์ชื่อสินค้า">
    </div>
    <div class="field">
      <label>ถ่ายรูปสต็อกจริง (ถ้าต้องการ)</label>
      <div class="photo" id="photo" onclick="document.getElementById('photoInput').click()">
        <svg class="ico ico-lg" viewBox="0 0 24 24"><path d="M3 9a2 2 0 0 1 2-2h2l1.5-2.2h7L17 7h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.3"/></svg>
        <span>แตะเพื่อถ่ายรูป</span>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">
    </div>
    <div class="field"><label>หมายเหตุ</label><input type="text" id="note" placeholder="เช่น ล็อต, ซัพพลายเออร์"></div>
    <div class="field"><label>ผู้บันทึก</label><input type="text" id="user" placeholder="ชื่อผู้บันทึก"></div>
    <button class="btn block big" id="saveBtn" onclick="save()"><svg class="ico" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h7"/></svg> บันทึกรับเข้า</button>
  </div>

  <!-- ล่าสุด -->
  <div class="card">
    <div class="card-t"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> รับเข้าล่าสุด</div>
    <div id="recent"><div class="empty">—</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ใส่ลิงก์ Web App จาก Apps Script (ลงท้ายด้วย /exec)
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyC5xQNqYT2qhxqAyrA8hgIuWYw8eb3eMJ2YEfwefMPLHTnLV4FoWdpQ2oVtQrXIVWzzw/exec'; // <<< เช่น 'https://script.google.com/macros/s/AKfy.../exec'

let CATALOG = [], currentFound=null, currentPhoto=null, day='wed';
const have = !!API_URL;

/* ---------- API ---------- */
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='cb_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    const t=setTimeout(()=>{clean();rej(new Error('หมดเวลา'));},25000);
    function clean(){try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); clearTimeout(t);}
    window[cb]=d=>{clean();res(d);};
    s.onerror=()=>{clean();rej(new Error('เชื่อมต่อไม่ได้'));};
    const q=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    s.src=API_URL+'?'+q+'&callback='+cb; document.body.appendChild(s);
  });
}
async function postWrite(payload){
  await fetch(API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
}
function sync(state,txt){const d=document.getElementById('syncDot');d.className='dot'+(state==='busy'?' busy':state==='err'?' err':'');document.getElementById('syncTxt').textContent=txt;}

/* ---------- init ---------- */
async function init(){
  // เติมชื่อผู้บันทึกที่จำไว้
  try{const u=localStorage.getItem('stockin_user'); if(u)document.getElementById('user').value=u;
      const d=localStorage.getItem('stockin_day'); if(d){day=d; paintDay();}}catch(e){}
  if(!have){document.getElementById('cfg').classList.add('on');sync('err','โหมดทดลอง');return;}
  sync('busy','กำลังโหลด...');
  try{
    const r=await jsonp({action:'catalog'});
    if(r&&r.success){CATALOG=r.catalog||[];sync('ok','เชื่อมต่อแล้ว');}
    else throw new Error(r&&r.message||'โหลดแคตตาล็อกไม่สำเร็จ');
  }catch(e){sync('err','ออฟไลน์');toast('โหลดข้อมูลไม่สำเร็จ: '+e.message,'err');}
  loadRecent();
}
async function loadRecent(){
  if(!have)return;
  try{const r=await jsonp({action:'recent',limit:15}); if(r&&r.success)renderRecent(r.recent||[]);}catch(e){}
}

/* ---------- lookup ---------- */
function norm(s){return (s||'').toString().trim().toLowerCase();}
function lookup(code){const k=norm(code);if(!k)return null;return CATALOG.find(p=>norm(p.c1)===k||norm(p.c2)===k)||null;}
function doLookup(){
  const code=document.getElementById('code').value.trim();
  if(!code)return;
  const p=lookup(code);
  if(p)applyFound(p,code); else applyNotFound(code);
}
function applyFound(p,code){
  currentFound=p;
  document.getElementById('nf').classList.remove('on');
  document.getElementById('nameField').style.display='none';
  document.getElementById('pc').classList.add('on');
  document.getElementById('formCard').style.display='block';
  document.getElementById('pcImg').innerHTML=(p.imageUrl&&p.imageUrl.indexOf('http')===0)?'<img src="'+p.imageUrl+'" referrerpolicy="no-referrer" onerror="this.remove()">':'📦';
  document.getElementById('pcName').textContent=p.product;
  document.getElementById('pcBadges').innerHTML='<span class="badge">'+(p.brand||'-')+'</span>';
  document.getElementById('pcModel').innerHTML=p.model?('<b>รุ่นที่ใช้ได้</b>'+p.model):'';
  document.getElementById('pcStock').innerHTML=
    '<div><div class="n">'+(p.stockWed||0)+'</div><div class="l">คงเหลือ Wed</div></div>'+
    '<div><div class="n">'+(p.stockSun||0)+'</div><div class="l">คงเหลือ Sun</div></div>';
  toast('พบ: '+p.product,'ok');
}
function applyNotFound(code){
  currentFound=null;
  document.getElementById('pc').classList.remove('on');
  document.getElementById('formCard').style.display='block';
  document.getElementById('nameField').style.display='block';
  const nf=document.getElementById('nf');nf.textContent='ไม่พบรหัส '+code+' ในสตอคอะไหล่ — บันทึกประวัติได้ แต่จะยังไม่เพิ่มจำนวนสตอค';nf.classList.add('on');
}

/* ---------- scanner ---------- */
let scanner=null, camOn=false;
async function toggleCam(){
  if(camOn){await stopCam();return;}
  if(typeof Html5Qrcode==='undefined'){toast('โหลดตัวสแกนไม่สำเร็จ','err');return;}
  const reader=document.getElementById('reader');reader.classList.add('on');
  document.getElementById('camBtn').innerHTML='ปิดกล้อง';
  document.getElementById('scanHint').textContent='เล็งกล้องไปที่บาร์โค้ด...';
  try{
    scanner=new Html5Qrcode('reader',{verbose:false});
    const fmts=window.Html5QrcodeSupportedFormats?[
      Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.QR_CODE]:undefined;
    await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:170},formatsToSupport:fmts,aspectRatio:1.333},onScan,()=>{});
    camOn=true;
  }catch(e){
    document.getElementById('scanHint').textContent='เปิดกล้องไม่ได้ — พิมพ์รหัสเอง หรือใช้ "จากรูป"';
    reader.classList.remove('on');document.getElementById('camBtn').innerHTML='เปิดกล้อง';
  }
}
function onScan(text){
  if(!camOn)return;
  if(navigator.vibrate)navigator.vibrate(60);
  const code=text.trim();
  document.getElementById('code').value=code;
  stopCam();
  const p=lookup(code); if(p)applyFound(p,code);else applyNotFound(code);
}
async function stopCam(){
  camOn=false;document.getElementById('camBtn').innerHTML='เปิดกล้อง';
  document.getElementById('reader').classList.remove('on');document.getElementById('scanHint').textContent='';
  if(scanner){try{await scanner.stop();}catch(e){}try{scanner.clear();}catch(e){}scanner=null;}
}
function scanFromFile(e){
  const f=e.target.files[0];if(!f)return;
  if(typeof Html5Qrcode==='undefined'){toast('โหลดตัวสแกนไม่สำเร็จ','err');return;}
  const s=new Html5Qrcode('reader');
  document.getElementById('scanHint').textContent='กำลังอ่านบาร์โค้ดจากรูป...';
  s.scanFile(f,true).then(d=>{const code=d.trim();document.getElementById('code').value=code;document.getElementById('scanHint').textContent='';try{s.clear();}catch(e){}const p=lookup(code);if(p)applyFound(p,code);else applyNotFound(code);})
    .catch(()=>{document.getElementById('scanHint').textContent='ไม่พบบาร์โค้ดในรูป';try{s.clear();}catch(e){}});
  e.target.value='';
}

/* ---------- form ---------- */
function setDay(d){day=d;paintDay();try{localStorage.setItem('stockin_day',d);}catch(e){}}
function paintDay(){document.querySelectorAll('#daySeg button').forEach(b=>b.classList.toggle('on',b.dataset.day===day));
  document.getElementById('daySeg').classList.toggle('green',day==='wed');}
function bump(d){const i=document.getElementById('qty');i.value=Math.max(1,(parseInt(i.value)||1)+d);}
function onPhoto(e){
  const f=e.target.files[0];if(!f)return;
  const z=document.getElementById('photo');z.innerHTML='<svg class="ico ico-lg spin" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/></svg><span>กำลังประมวลผล...</span>';
  resize(f,900,0.72).then(url=>{currentPhoto=url;z.innerHTML='<img src="'+url+'"><div class="retake" onclick="event.stopPropagation();retake()">ถ่ายใหม่</div>';}).catch(()=>{toast('อ่านรูปไม่สำเร็จ','err');retake();});
}
function resize(file,max,q){return new Promise((res,rej)=>{const r=new FileReader();r.onerror=rej;r.onload=ev=>{const img=new Image();img.onerror=rej;img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>max){w=Math.round(w*max/h);h=max;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};img.src=ev.target.result;};r.readAsDataURL(file);});}
function retake(){currentPhoto=null;document.getElementById('photo').innerHTML='<svg class="ico ico-lg" viewBox="0 0 24 24"><path d="M3 9a2 2 0 0 1 2-2h2l1.5-2.2h7L17 7h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.3"/></svg><span>แตะเพื่อถ่ายรูป</span>';document.getElementById('photoInput').value='';}

/* ---------- save ---------- */
async function save(){
  const code=document.getElementById('code').value.trim()||'-';
  const qty=parseInt(document.getElementById('qty').value)||0;
  const note=document.getElementById('note').value.trim();
  const user=document.getElementById('user').value.trim();
  const product=currentFound?currentFound.product:document.getElementById('pname').value.trim();
  const brand=currentFound?currentFound.brand:'';
  if(qty<1){toast('จำนวนต้องมากกว่า 0','err');return;}
  if(!currentFound&&!product){toast('กรุณาพิมพ์ชื่อสินค้า','err');return;}
  try{localStorage.setItem('stockin_user',user);}catch(e){}

  if(!have){toast('โหมดทดลอง: ยังไม่ได้ตั้งค่า API_URL','err');return;}
  const payload={action:'receiveStockIn',code,qty,day,product,brand,note,user:user||'StockIn',photo:currentPhoto||''};
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.innerHTML='<svg class="ico spin" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/></svg> กำลังบันทึก...';
  sync('busy','กำลังบันทึก...');
  try{
    await postWrite(payload);
    await new Promise(r=>setTimeout(r,900));
    // รีเฟรชแคตตาล็อก (ให้ยอดคงเหลืออัปเดต) + ประวัติ
    try{const c=await jsonp({action:'catalog'});if(c&&c.success)CATALOG=c.catalog||CATALOG;}catch(e){}
    await loadRecent();
    sync('ok','เชื่อมต่อแล้ว');
    toast('บันทึกรับเข้า '+product+' จำนวน '+qty,'ok');
    reset();
  }catch(e){sync('err','ผิดพลาด');toast('บันทึกไม่สำเร็จ: '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML='<svg class="ico" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h7"/></svg> บันทึกรับเข้า';}
}
function reset(){
  currentFound=null;currentPhoto=null;
  document.getElementById('code').value='';document.getElementById('qty').value=1;
  document.getElementById('note').value='';document.getElementById('pname').value='';
  document.getElementById('pc').classList.remove('on');document.getElementById('nf').classList.remove('on');
  document.getElementById('formCard').style.display='none';document.getElementById('nameField').style.display='none';
  retake();document.getElementById('code').focus();
}

/* ---------- recent ---------- */
function fmt(ts){if(!ts)return'';const d=new Date(ts);if(isNaN(d))return ts;const now=new Date();const hm=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);if(d.toDateString()===now.toDateString())return'วันนี้ '+hm;const y=new Date(now);y.setDate(now.getDate()-1);if(d.toDateString()===y.toDateString())return'เมื่อวาน '+hm;return('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+hm;}
function renderRecent(list){
  const el=document.getElementById('recent');
  if(!list.length){el.innerHTML='<div class="empty">ยังไม่มีรายการรับเข้า</div>';return;}
  el.innerHTML=list.map(r=>{
    const img=(r.photoUrl&&r.photoUrl.indexOf('http')===0)?'<img src="'+r.photoUrl+'" referrerpolicy="no-referrer" onerror="this.remove()">':'📦';
    return '<div class="rec"><div class="rec-th">'+img+'</div><div class="rec-mid"><div class="rec-nm">'+(r.product||r.code)+'</div>'+
      '<div class="rec-meta">'+(r.brand?r.brand+' · ':'')+r.day+' · '+fmt(r.ts)+(r.warn?' · ⚠ '+r.warn:'')+'</div></div>'+
      '<div class="rec-q">+'+r.qty+'</div></div>';
  }).join('');
}

/* ---------- toast ---------- */
let tt;
function toast(msg,type){const t=document.getElementById('toast');t.style.borderLeftColor=type==='err'?'#ff6b6b':type==='info'?'#9ecbff':'#88e6a0';t.textContent=msg;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2800);}

paintDay();
init();
</script>
