<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>สแกนรหัสสินค้า — สต็อกอะไหล่</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --red:#c0172b; --red-light:#e8203a; --red-dark:#7a0e1c;
    --green:#1aa866;
    --glass:rgba(255,255,255,0.10); --glass-md:rgba(255,255,255,0.15);
    --glass-bd:rgba(255,255,255,0.22); --glass-in:rgba(255,255,255,0.07);
    --tw:#fff; --tws:rgba(255,255,255,0.72); --twm:rgba(255,255,255,0.45);
    --r:20px; --r-sm:13px;
  }
  html,body{height:100%}
  body{
    background:#5a0010; color:var(--tw);
    font-family:'Prompt',sans-serif; min-height:100vh;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body::before{content:'';position:fixed;border-radius:50%;width:60vw;height:60vw;max-width:500px;max-height:500px;
    background:radial-gradient(circle,rgba(192,23,43,0.70)0%,transparent 70%);
    top:-12%;left:-16%;filter:blur(80px);z-index:0;pointer-events:none;animation:orb1 9s ease-in-out infinite alternate}
  body::after{content:'';position:fixed;border-radius:50%;width:55vw;height:55vw;max-width:420px;max-height:420px;
    background:radial-gradient(circle,rgba(140,10,25,0.60)0%,transparent 70%);
    bottom:-10%;right:-14%;filter:blur(80px);z-index:0;pointer-events:none;animation:orb2 11s ease-in-out infinite alternate}
  @keyframes orb1{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,60px) scale(1.12)}}
  @keyframes orb2{from{transform:translate(0,0) scale(1)}to{transform:translate(-40px,-50px) scale(1.1)}}

  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px 14px 40px;min-height:100vh}

  /* Header */
  .top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .top .logo{width:40px;height:40px;border-radius:12px;background:var(--red);display:grid;place-items:center;
    box-shadow:0 6px 20px rgba(192,23,43,0.5)}
  .top .logo svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2}
  .top h1{font-size:18px;font-weight:600;line-height:1.15}
  .top p{font-size:11.5px;color:var(--twm)}
  .gear{margin-left:auto;width:38px;height:38px;border-radius:11px;border:1px solid var(--glass-bd);
    background:var(--glass-in);color:var(--tws);display:grid;place-items:center;cursor:pointer}
  .gear svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

  /* Card */
  .card{background:var(--glass-md);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-bd);border-radius:var(--r);
    box-shadow:0 16px 50px rgba(0,0,0,0.30),inset 0 1px 0 rgba(255,255,255,0.16);
    padding:16px;margin-bottom:14px}

  /* Mode toggle */
  .seg{display:flex;gap:4px;background:var(--glass-in);border:1px solid var(--glass-bd);border-radius:12px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;background:none;border:none;color:var(--tws);font-family:inherit;font-size:14px;font-weight:500;
    padding:10px;border-radius:9px;cursor:pointer;transition:all .15s}
  .seg button.on.in{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(192,23,43,0.5)}
  .seg button.on.count{background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(26,168,102,0.5)}

  /* Scanner stage */
  .scan-stage{position:relative;width:100%;aspect-ratio:1/1;border-radius:var(--r-sm);overflow:hidden;background:#000;
    border:1px solid rgba(255,255,255,0.12)}
  #reader{width:100%;height:100%}
  #reader video{width:100%!important;height:100%!important;object-fit:cover!important}
  /* hide library's default ui */
  #reader__dashboard_section_csr,#reader__status_span,#reader__header_message{display:none!important}
  .scan-stage img{display:none!important}
  .scan-frame{position:absolute;inset:16% 12%;border-radius:12px;pointer-events:none;box-shadow:0 0 0 2000px rgba(0,0,0,0.30)}
  .scan-frame::before{content:'';position:absolute;left:0;top:0;width:28px;height:28px;border-top:3px solid #ff3b50;border-left:3px solid #ff3b50;border-radius:8px 0 0 0}
  .scan-frame::after{content:'';position:absolute;right:0;bottom:0;width:28px;height:28px;border-bottom:3px solid #ff3b50;border-right:3px solid #ff3b50;border-radius:0 0 8px 0}
  .scan-line{position:absolute;left:10%;right:10%;top:16%;height:3px;border-radius:99px;pointer-events:none;
    background:linear-gradient(90deg,transparent,#ff3b50,#ff8a96,#ff3b50,transparent);
    box-shadow:0 0 14px 3px rgba(255,59,80,0.75);animation:sweep 2s cubic-bezier(.45,0,.55,1) infinite}
  @keyframes sweep{0%{transform:translateY(0);opacity:.25}8%{opacity:1}50%{transform:translateY(330%);opacity:1}92%{opacity:1}100%{transform:translateY(0);opacity:.25}}
  .stage-off{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    color:var(--tws);font-size:13px;text-align:center;padding:18px;background:rgba(0,0,0,0.35)}
  .stage-off.hide{display:none}

  .hint{font-size:12px;color:var(--tws);text-align:center;margin-top:10px;min-height:16px}

  /* Buttons */
  .row{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:inherit;font-size:14px;font-weight:500;padding:12px 14px;border-radius:12px;cursor:pointer;
    border:1px solid var(--glass-bd);background:var(--glass-in);color:var(--tw);transition:all .15s}
  .btn:hover{background:rgba(255,255,255,0.16)}
  .btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
  .btn.primary{background:var(--red);border-color:rgba(255,255,255,0.12);box-shadow:0 6px 18px rgba(192,23,43,0.45)}
  .btn.primary:hover{background:var(--red-light)}
  .btn.green{background:var(--green);box-shadow:0 6px 18px rgba(26,168,102,0.45)}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:.55;pointer-events:none}

  /* Manual input */
  .manual{display:flex;gap:8px;margin-top:10px}
  .manual input{flex:1;min-width:0;background:var(--glass-in);border:1px solid var(--glass-bd);border-radius:11px;
    color:#fff;padding:11px 13px;font-family:inherit;font-size:14px;outline:none}
  .manual input::placeholder{color:var(--twm)}
  .manual input:focus{border-color:rgba(255,255,255,0.55)}
  .manual button{flex:0 0 auto;padding:0 16px}

  /* Result card */
  .result{display:none}
  .pc-img{width:100%;aspect-ratio:4/3;border-radius:var(--r-sm);background:#fff;overflow:hidden;position:relative;
    display:flex;align-items:center;justify-content:center;color:#bbb;font-size:40px;border:1px solid rgba(255,255,255,0.15)}
  .pc-img img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
  .pc-name{font-size:17px;font-weight:600;line-height:1.35;margin-top:12px}
  .pc-sub{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .badge{display:inline-block;padding:4px 11px;border-radius:8px;font-size:12px;font-weight:600;
    border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.10)}
  .code{font-size:12px;color:var(--twm)}
  .stocks{display:flex;gap:9px;margin-top:13px}
  .stocks>div{flex:1;background:var(--glass-in);border:1px solid var(--glass-bd);border-radius:11px;padding:9px 10px;text-align:center}
  .stocks .n{font-size:19px;font-weight:700}
  .stocks .l{font-size:10.5px;color:var(--twm);margin-top:1px}

  .field{margin-top:14px}
  .field>label{display:block;font-size:12.5px;color:var(--tws);margin-bottom:7px;font-weight:500}

  /* Day selector */
  .day-seg{display:flex;gap:4px;background:var(--glass-in);border:1px solid var(--glass-bd);border-radius:11px;padding:4px}
  .day-seg button{flex:1;background:none;border:none;color:var(--tws);font-family:inherit;font-size:14px;font-weight:500;padding:9px;border-radius:8px;cursor:pointer}
  .day-seg button.on{background:var(--red);color:#fff}

  /* Stepper — ปุ่ม - / + พื้นหลังแดง, เล็ก */
  .stepper{display:inline-flex}
  .stepper button{width:42px;height:42px;border:1px solid rgba(192,23,43,0.55);background:var(--red);color:#fff;
    font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:filter .15s,transform .08s}
  .stepper button:hover{filter:brightness(1.12)}
  .stepper button:active{transform:scale(0.93)}
  .stepper button:first-child{border-radius:10px 0 0 10px}
  .stepper button:last-child{border-radius:0 10px 10px 0}
  .stepper input{width:84px;text-align:center;border:1px solid var(--glass-bd);border-left:none;border-right:none;border-radius:0;
    background:var(--glass-in);color:#fff;font-family:inherit;font-size:18px;font-weight:700;outline:none}
  .note-input{width:100%;background:var(--glass-in);border:1px solid var(--glass-bd);border-radius:11px;color:#fff;
    padding:11px 13px;font-family:inherit;font-size:14px;outline:none}
  .note-input::placeholder{color:var(--twm)}

  .nf{margin-top:12px;padding:11px 13px;border-radius:11px;font-size:12.5px;
    background:rgba(190,130,20,0.18);border:1px solid rgba(255,200,80,0.4);color:rgba(255,235,200,0.95)}

  /* Recent */
  .recent-title{font-size:11px;font-weight:600;color:rgba(255,200,200,0.9);text-transform:uppercase;letter-spacing:.6px;margin:4px 2px 10px}
  .rec-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;background:var(--glass-in);
    border:1px solid rgba(255,255,255,0.10);margin-bottom:7px}
  .rec-item .ri-name{flex:1;min-width:0;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec-item .ri-qty{font-size:13px;font-weight:700;color:#9fe7c0}
  .rec-empty{color:var(--twm);font-size:12.5px;text-align:center;padding:14px}

  /* Spinner */
  .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:inline-block}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:200;
    background:rgba(60,0,8,0.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.18);
    border-radius:13px;padding:13px 18px;color:#fff;font-size:13.5px;max-width:90vw;text-align:center;
    box-shadow:0 10px 34px rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:all .25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{border-left:3px solid #5fe39a}
  .toast.error{border-left:3px solid #ff7a7a}

  /* Settings sheet */
  .sheet-overlay{position:fixed;inset:0;z-index:150;background:rgba(20,0,4,0.6);backdrop-filter:blur(6px);
    display:none;align-items:flex-end;justify-content:center;padding:0}
  .sheet-overlay.show{display:flex}
  .sheet{width:100%;max-width:480px;background:linear-gradient(160deg,rgba(45,12,16,0.97),rgba(16,5,7,0.97));
    border:1px solid var(--glass-bd);border-bottom:none;border-radius:22px 22px 0 0;padding:20px 18px 26px;
    box-shadow:0 -16px 50px rgba(0,0,0,0.5)}
  .sheet h3{font-size:16px;font-weight:600;margin-bottom:14px}
  .sheet label{display:block;font-size:12.5px;color:var(--tws);margin:12px 0 6px;font-weight:500}
  .sheet input{width:100%;background:var(--glass-in);border:1px solid var(--glass-bd);border-radius:11px;color:#fff;
    padding:11px 13px;font-family:inherit;font-size:13.5px;outline:none}
  .sheet .tip{font-size:11px;color:var(--twm);margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="top">
    <div class="logo">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/></svg>
    </div>
    <div>
      <h1>สแกนรหัสสินค้า</h1>
      <p id="apiState">เชื่อมต่อระบบสต็อกอะไหล่</p>
    </div>
    <button class="gear" id="gearBtn" title="ตั้งค่า">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>

  <!-- Mode -->
  <div class="seg" id="modeSeg">
    <button class="on in" data-mode="in">📥 รับเข้า</button>
    <button data-mode="count">📋 นับสตอค</button>
  </div>

  <!-- Scanner -->
  <div class="card">
    <div class="scan-stage" id="stage">
      <div id="reader"></div>
      <div class="scan-line"></div>
      <div class="scan-frame"></div>
      <div class="stage-off" id="stageOff">
        <span>กดปุ่มด้านล่างเพื่อเปิดกล้อง<br>แล้วเล็งบาร์โค้ดให้อยู่ในกรอบ</span>
      </div>
    </div>
    <div class="hint" id="hint"></div>

    <div class="row">
      <button class="btn primary" id="camBtn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span id="camBtnLabel">เปิดกล้อง</span>
      </button>
      <label class="btn" style="cursor:pointer">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></svg>
        <span>อัพโหลดรูป</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </label>
    </div>

    <div class="manual">
      <input id="codeInput" placeholder="หรือพิมพ์รหัสสินค้าเอง" autocomplete="off" />
      <button class="btn primary" id="lookupBtn">ค้นหา</button>
    </div>
  </div>

  <!-- Result -->
  <div class="card result" id="result">
    <div class="pc-img" id="pcImg">📦</div>
    <div class="pc-name" id="pcName">—</div>
    <div class="pc-sub">
      <span class="badge" id="pcBrand">-</span>
      <span class="code" id="pcCode"></span>
    </div>
    <div class="stocks" id="pcStocks"></div>

    <div class="nf" id="nfBox" style="display:none"></div>

    <div class="field" id="dayField">
      <label>รับเข้าวันไหน</label>
      <div class="day-seg" id="daySeg">
        <button class="on" data-day="wed">สตอค Wed</button>
        <button data-day="sun">สตอค Sun</button>
      </div>
    </div>

    <div class="field">
      <label id="qtyLabel">จำนวนที่รับเข้า</label>
      <div class="stepper">
        <button id="minus" type="button">−</button>
        <input type="number" id="qty" value="1" min="0" inputmode="numeric" />
        <button id="plus" type="button">+</button>
      </div>
    </div>

    <div class="field" id="noteField">
      <label>หมายเหตุ (ถ้ามี)</label>
      <input class="note-input" id="note" placeholder="เช่น ล็อต, ซัพพลายเออร์" />
    </div>

    <div class="row">
      <button class="btn" id="cancelBtn">ยกเลิก</button>
      <button class="btn primary" id="saveBtn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h7"/></svg>
        <span id="saveLabel">บันทึก</span>
      </button>
    </div>
  </div>

  <!-- Recent -->
  <div class="recent-title">บันทึกล่าสุด (รอบนี้)</div>
  <div id="recentList"><div class="rec-empty">ยังไม่มีรายการ</div></div>
</div>

<!-- Settings -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <h3>ตั้งค่า</h3>
    <label>URL ของ Web App (Apps Script /exec)</label>
    <input id="apiInput" placeholder="https://script.google.com/macros/s/..../exec" />
    <div class="tip">วาง URL จาก Apps Script → Deploy → Web app แล้วลงท้ายด้วย /exec</div>
    <label>ชื่อผู้บันทึก</label>
    <input id="userInput" placeholder="เช่น ช่างเอ" />
    <div class="row" style="margin-top:18px">
      <button class="btn" id="sheetCancel">ปิด</button>
      <button class="btn primary" id="sheetSave">บันทึกการตั้งค่า</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================================================
 *  ตั้งค่า API — แก้ค่านี้เป็น URL /exec ของคุณ
 *  หรือเปิดผ่าน ...?api=<url> หรือกดปุ่มเฟือง (เฟืองจะจำค่าไว้)
 * ====================================================== */
var DEFAULT_API_URL = 'PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE';

/* ---- storage แบบกันพัง (กรณีพรีวิวที่ไม่มี localStorage) ---- */
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

var qp = new URLSearchParams(location.search);
var API_URL = qp.get('api') || lsGet('si_api') || DEFAULT_API_URL;
var USER    = lsGet('si_user') || '';
var MODE    = (qp.get('mode') === 'count') ? 'count' : 'in';   // in = รับเข้า, count = นับสตอค
var DAY     = 'wed';

var scanner = null, scanning = false, current = null, busy = false;
var session = [];

var $ = function(id){ return document.getElementById(id); };

/* ---------------- Toast ---------------- */
var toastTimer = null;
function toast(msg, type){
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = 'toast ' + (type || ''); }, 2600);
}

/* ---------------- JSONP (เลี่ยง CORS) ---------------- */
function jsonp(params){
  return new Promise(function(resolve, reject){
    if(!API_URL || API_URL.indexOf('http') !== 0){
      reject(new Error('ยังไม่ได้ตั้งค่า URL ของ Web App (กดปุ่มเฟือง)'));
      return;
    }
    var cb = 'si_cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    var s = document.createElement('script');
    var done = false;
    var timer = setTimeout(function(){ finish(); reject(new Error('หมดเวลาเชื่อมต่อ')); }, 25000);
    function finish(){
      if(done) return; done = true;
      clearTimeout(timer);
      try{ delete window[cb]; }catch(e){ window[cb] = undefined; }
      if(s.parentNode) s.parentNode.removeChild(s);
    }
    window[cb] = function(data){ finish(); resolve(data); };
    var parts = [];
    Object.keys(params).forEach(function(k){
      var v = params[k]; if(v == null) v = '';
      parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
    });
    parts.push('callback=' + cb);
    s.src = API_URL + (API_URL.indexOf('?') >= 0 ? '&' : '?') + parts.join('&');
    s.onerror = function(){ finish(); reject(new Error('เชื่อมต่อไม่สำเร็จ — ตรวจ URL/การ Deploy')); };
    document.body.appendChild(s);
  });
}

/* ---------------- Scanner config (เร็ว/แม่นยำ) ---------------- */
function scannerFormats(){
  if(typeof Html5QrcodeSupportedFormats === 'undefined') return undefined;
  var F = Html5QrcodeSupportedFormats;
  return [F.QR_CODE, F.CODE_128, F.CODE_39, F.CODE_93, F.EAN_13, F.EAN_8,
          F.UPC_A, F.UPC_E, F.ITF, F.CODABAR];
}
function newReader(){
  var cfg = { verbose:false, experimentalFeatures:{ useBarCodeDetectorIfSupported:true } };
  var f = scannerFormats(); if(f) cfg.formatsToSupport = f;
  return new Html5Qrcode('reader', cfg);
}
function qrbox(w, h){
  return { width: Math.floor(Math.min(w*0.82, 320)), height: Math.floor(Math.min(h*0.55, 220)) };
}

function startScan(){
  if(scanning) return;
  if(typeof Html5Qrcode === 'undefined'){ toast('โหลดตัวสแกนไม่สำเร็จ','error'); return; }
  $('stageOff').classList.add('hide');
  $('hint').textContent = 'กำลังเปิดกล้อง…';
  scanner = newReader();
  Html5Qrcode.getCameras().then(function(devices){
    if(!devices || !devices.length){ $('hint').textContent = 'ไม่พบกล้อง — ใช้อัพโหลดรูปแทน'; return; }
    var back = devices.find(function(d){ return /back|rear|environment/i.test(d.label); }) || devices[devices.length-1];
    scanner.start(back.id, { fps:15, qrbox:qrbox, aspectRatio:1.0, disableFlip:false },
      onScan, function(){}
    ).then(function(){ scanning = true; $('camBtnLabel').textContent = 'หยุดกล้อง'; $('hint').textContent = 'เล็งบาร์โค้ดให้อยู่ในกรอบ…'; })
     .catch(function(){ $('hint').textContent = 'เริ่มกล้องไม่สำเร็จ — ใช้อัพโหลดรูปแทน'; $('stageOff').classList.remove('hide'); });
  }).catch(function(){ $('hint').textContent = 'ขออนุญาตกล้องไม่สำเร็จ — ใช้อัพโหลดรูปแทน'; $('stageOff').classList.remove('hide'); });
}
function stopScan(cb){
  $('camBtnLabel').textContent = 'เปิดกล้อง';
  if(scanner && scanning){
    scanner.stop().then(function(){ try{ scanner.clear(); }catch(e){} scanner=null; scanning=false; if(cb)cb(); })
      .catch(function(){ scanner=null; scanning=false; if(cb)cb(); });
  } else { scanning=false; if(cb)cb(); }
}
function onScan(decoded){
  if(busy) return;
  var code = (decoded || '').trim();
  if(!code) return;
  $('hint').textContent = '✓ พบ: ' + code;
  stopScan(function(){ $('stageOff').classList.remove('hide'); lookup(code); });
}

/* ---------------- Lookup ---------------- */
function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function lookup(code){
  if(busy) return;
  busy = true;
  $('hint').textContent = 'กำลังค้นหา…';
  var action = (MODE === 'count') ? 'lookupcount' : 'lookup';
  jsonp({ action: action, code: code }).then(function(res){
    busy = false;
    if(res && res.success && res.product){
      showProduct(res.product, code);
    } else if(res && res.success && !res.product){
      if(MODE === 'count') showNotFoundCount(code);
      else showProduct(null, code, true);
    } else {
      toast((res && res.message) || 'ค้นหาไม่สำเร็จ', 'error');
      $('hint').textContent = '';
    }
  }).catch(function(e){ busy=false; $('hint').textContent=''; toast(e.message || 'ค้นหาไม่สำเร็จ','error'); });
}

function showProduct(p, code, notFound){
  current = p ? Object.assign({}, p, { code: code }) : { code: code, notFound:true };
  var img = (p && p.imageUrl && p.imageUrl.indexOf('http') === 0)
    ? '<img src="' + escapeHtml(p.imageUrl) + '" referrerpolicy="no-referrer" onerror="this.remove()">' : '📦';
  $('pcImg').innerHTML = img;
  $('pcName').textContent = (p && p.product) ? p.product : code;
  $('pcBrand').textContent = (p && p.brand) ? p.brand : '-';
  $('pcCode').textContent = '#' + code;

  if(MODE === 'count'){
    $('pcStocks').innerHTML = '<div><div class="n">' + ((p && p.stock!=null)?p.stock:0) + '</div><div class="l">คงเหลือปัจจุบัน</div></div>';
    $('qty').value = (p && p.stock!=null) ? p.stock : 0;
  } else {
    var sw = (p && p.stockWed!=null) ? p.stockWed : 0;
    var ss = (p && p.stockSun!=null) ? p.stockSun : 0;
    $('pcStocks').innerHTML =
      '<div><div class="n">' + sw + '</div><div class="l">คงเหลือ Wed</div></div>' +
      '<div><div class="n">' + ss + '</div><div class="l">คงเหลือ Sun</div></div>';
    $('qty').value = 1;
  }

  var nf = $('nfBox');
  if(notFound){
    nf.style.display = 'block';
    nf.textContent = 'ไม่พบรหัส ' + code + ' ในชีท “สตอคอะไหล่” — บันทึกประวัติได้ แต่จะยังไม่เพิ่มจำนวน';
  } else { nf.style.display = 'none'; }

  $('result').style.display = 'block';
  $('hint').textContent = '';
  $('result').scrollIntoView({ behavior:'smooth', block:'center' });
}

function showNotFoundCount(code){
  current = null;
  toast('ไม่พบรหัส ' + code + ' ในชีทนับสตอค (PW/PS)', 'error');
  $('hint').textContent = '✗ ไม่พบรหัส ' + code;
}

/* ---------------- Save ---------------- */
function save(){
  if(busy || !current) return;
  var qty = parseInt($('qty').value, 10);
  if(isNaN(qty)){ toast('กรอกจำนวนให้ถูกต้อง','error'); return; }

  if(MODE === 'in'){
    if(qty < 1){ toast('จำนวนต้องมากกว่า 0','error'); return; }
  } else {
    if(qty < 0){ toast('จำนวนต้องไม่ติดลบ','error'); return; }
    if(!current.row || !current.sheetName){ toast('ข้อมูลไม่ครบ ลองสแกนใหม่','error'); return; }
  }

  busy = true;
  var btn = $('saveBtn'); btn.disabled = true;
  var lbl = $('saveLabel'); var old = lbl.textContent; lbl.innerHTML = '<span class="spin"></span>';

  var params;
  if(MODE === 'in'){
    params = { action:'savein', code: current.code, qty: qty, day: DAY,
               product: current.product || '', brand: current.brand || '',
               note: $('note').value.trim(), user: USER || 'ScanIn' };
  } else {
    params = { action:'savecount', sheetName: current.sheetName, row: current.row,
               qty: qty, user: USER || 'ScanCount' };
  }

  jsonp(params).then(function(res){
    busy = false; btn.disabled = false; lbl.textContent = old;
    if(res && res.success){
      var name = current.product || current.code;
      toast(res.message || 'บันทึกสำเร็จ', 'success');
      addRecent(name, MODE === 'in' ? ('+'+qty) : ('='+qty));
      resetResult();
    } else {
      toast((res && res.message) || 'บันทึกไม่สำเร็จ', 'error');
    }
  }).catch(function(e){ busy=false; btn.disabled=false; lbl.textContent=old; toast(e.message || 'บันทึกไม่สำเร็จ','error'); });
}

function addRecent(name, qtyTxt){
  session.unshift({ name:name, qty:qtyTxt });
  if(session.length > 12) session.pop();
  renderRecent();
}
function renderRecent(){
  var box = $('recentList');
  if(!session.length){ box.innerHTML = '<div class="rec-empty">ยังไม่มีรายการ</div>'; return; }
  box.innerHTML = session.map(function(r){
    return '<div class="rec-item"><div class="ri-name">' + escapeHtml(r.name) + '</div><div class="ri-qty">' + escapeHtml(r.qty) + '</div></div>';
  }).join('');
}

function resetResult(){
  current = null;
  $('result').style.display = 'none';
  $('codeInput').value = '';
  $('note').value = '';
  $('hint').textContent = 'สแกนหรือพิมพ์รหัสถัดไป';
}

/* ---------------- Mode / Day ---------------- */
function setMode(m){
  MODE = m;
  document.querySelectorAll('#modeSeg button').forEach(function(b){
    var on = b.dataset.mode === m;
    b.className = on ? ('on ' + m) : '';
  });
  $('dayField').style.display  = (m === 'in') ? 'block' : 'none';
  $('noteField').style.display = (m === 'in') ? 'block' : 'none';
  $('qtyLabel').textContent    = (m === 'in') ? 'จำนวนที่รับเข้า' : 'จำนวนนับได้จริง';
  $('saveLabel').textContent   = (m === 'in') ? 'บันทึกรับเข้า' : 'บันทึกการนับ';
  resetResult();
  $('hint').textContent = '';
}
function setDay(d){
  DAY = d;
  document.querySelectorAll('#daySeg button').forEach(function(b){ b.classList.toggle('on', b.dataset.day === d); });
}

/* ---------------- File upload scan ---------------- */
function scanFile(file){
  if(typeof Html5Qrcode === 'undefined'){ toast('โหลดตัวสแกนไม่สำเร็จ','error'); return; }
  $('hint').textContent = 'กำลังอ่านบาร์โค้ดจากรูป…';
  var r = newReader();
  r.scanFile(file, true).then(function(d){ try{ r.clear(); }catch(e){} lookup((d||'').trim()); })
    .catch(function(){ try{ r.clear(); }catch(e){} $('hint').textContent = 'ไม่พบบาร์โค้ดในรูป'; });
}

/* ---------------- Settings ---------------- */
function openSheet(){
  $('apiInput').value = (API_URL && API_URL.indexOf('http')===0) ? API_URL : '';
  $('userInput').value = USER;
  $('sheetOverlay').classList.add('show');
}
function closeSheet(){ $('sheetOverlay').classList.remove('show'); }
function saveSheet(){
  var url = $('apiInput').value.trim();
  var u = $('userInput').value.trim();
  if(url){ API_URL = url; lsSet('si_api', url); }
  USER = u; lsSet('si_user', u);
  updateApiState();
  closeSheet();
  toast('บันทึกการตั้งค่าแล้ว','success');
}
function updateApiState(){
  $('apiState').textContent = (API_URL && API_URL.indexOf('http')===0) ? 'เชื่อมต่อระบบสต็อกอะไหล่แล้ว' : '⚠️ ยังไม่ได้ตั้งค่า URL (กดเฟือง)';
}

/* ---------------- Bind ---------------- */
$('camBtn').addEventListener('click', function(){ if(scanning) stopScan(function(){ $('stageOff').classList.remove('hide'); $('hint').textContent=''; }); else startScan(); });
$('fileInput').addEventListener('change', function(e){ var f=e.target.files[0]; if(f) scanFile(f); e.target.value=''; });
$('lookupBtn').addEventListener('click', function(){ var c=$('codeInput').value.trim(); if(c) lookup(c); });
$('codeInput').addEventListener('keyup', function(e){ if(e.key==='Enter'){ var c=$('codeInput').value.trim(); if(c) lookup(c); } });
$('minus').addEventListener('click', function(){ var i=$('qty'); var min=(MODE==='in')?1:0; i.value=Math.max(min,(parseInt(i.value,10)||0)-1); });
$('plus').addEventListener('click', function(){ var i=$('qty'); i.value=(parseInt(i.value,10)||0)+1; });
$('saveBtn').addEventListener('click', save);
$('cancelBtn').addEventListener('click', resetResult);
document.querySelectorAll('#modeSeg button').forEach(function(b){ b.addEventListener('click', function(){ setMode(b.dataset.mode); }); });
document.querySelectorAll('#daySeg button').forEach(function(b){ b.addEventListener('click', function(){ setDay(b.dataset.day); }); });
$('gearBtn').addEventListener('click', openSheet);
$('sheetCancel').addEventListener('click', closeSheet);
$('sheetSave').addEventListener('click', saveSheet);
$('sheetOverlay').addEventListener('click', function(e){ if(e.target===$('sheetOverlay')) closeSheet(); });

/* ---------------- Init ---------------- */
setMode(MODE);
setDay('wed');
updateApiState();
if(!API_URL || API_URL.indexOf('http')!==0){ setTimeout(openSheet, 400); }
</script>
